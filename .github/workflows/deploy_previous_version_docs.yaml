name: "CF: Deploy Previous Version Docs"

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'The old version tag to build docs for (e.g., v0.15.0)'
        required: true
        type: string

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main branch (for latest templates and theme)
        uses: actions/checkout@v4
        with:
          ref: 'main'
          submodules: 'recursive'
          fetch-depth: 0

      - name: Checkout old content from tag into a temporary directory
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.version_tag }}
          path: 'old_version_source'
          sparse-checkout: |
            docs

      - name: Replace content with old version
        run: |
          rm -rf docs/
          mv ./old_version_source/docs docs

      - name: Patch Config and Templates for Cloudflare
        run: |
          # Strip GitHub domain from config
          sed -i 's|https://googleapis.github.io/genai-toolbox/|/|g' .hugo/hugo.toml
          # Strip hardcoded prefix from navbar
          if [ -f ".hugo/layouts/partials/navbar-version-selector.html" ]; then
            sed -i 's|/genai-toolbox/|/|g' .hugo/layouts/partials/navbar-version-selector.html
          fi
          # Ensure version is in menu
          if ! grep -q "${{ github.event.inputs.version_tag }}" .hugo/hugo.toml; then
            sed -i "/\[params\.versions\]/a \ \ [[params.versions]]\n\ \ version = \"${{ github.event.inputs.version_tag }}\"\n\ \ url = \"/${{ github.event.inputs.version_tag }}/\"" .hugo/hugo.toml
          fi

      - name: Setup Hugo and Node
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.145.0"
          extended: true
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Dependencies
        run: |
          cd .hugo
          npm ci
          hugo mod clean
          hugo mod get -u

      - name: Build Hugo Site for Archived Version
        run: hugo --minify
        working-directory: .hugo
        env:
          HUGO_BASEURL: https://go.mcp-toolbox.dev/${{ github.event.inputs.version_tag }}/
          HUGO_RELATIVEURLS: false

      - name: Deploy to v1-docsite (Versioned Dir)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .hugo/public
          publish_branch: v1-docsite
          destination_dir: ./${{ github.event.inputs.version_tag }}
          keep_files: true
          allow_empty_commit: true
          commit_message: "cf-docs(backport): deploy docs for ${{ github.event.inputs.version_tag }}"

      - name: Clean Build Directory
        run: rm -rf .hugo/public

      - name: Build Hugo Site (Root)
        run: hugo --minify
        working-directory: .hugo
        env:
          HUGO_BASEURL: https://go.mcp-toolbox.dev/
          HUGO_RELATIVEURLS: false

      - name: Deploy to v1-docsite (Root)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .hugo/public
          publish_branch: v1-docsite
          keep_files: true
          allow_empty_commit: true
          commit_message: "cf-deploy: docs to root for ${{ github.event.inputs.version_tag }}"
