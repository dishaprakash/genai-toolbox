name: "Sync v1-docsite to Cloudflare"

on:
  workflow_run:
    workflows: ["Deploy In-development docs", "Deploy Versioned Docs", "Deploy Previous Version Docs"]
    types:
      - completed

concurrency:
  group: cloudflare-sync
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source of Truth
        uses: actions/checkout@v4
        with:
          ref: 'v1-docsite'

      - name: Remove Git metadata
        run: rm -rf .git

      - name: Force delete oversized files
        run: |
          echo "Finding and deleting files over 25MB..."
          # Changed to +25M to match your requirement precisely
          find . -type f -size +25M -delete
          echo "Cleanup complete."

      - name: Deploy Entire Site to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=toolbox-docs --branch=main
