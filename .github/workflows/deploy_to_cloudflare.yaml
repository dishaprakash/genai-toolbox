name: "Sync v1-docsite to Cloudflare"

on:
  workflow_run:
    workflows: ["Deploy In-development docs", "Deploy Versioned Docs", "Deploy Previous Version Docs"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source of Truth
        uses: actions/checkout@v4
        with:
          ref: 'v1-docsite'

      - name: Deploy Entire Site to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=toolbox-docs --branch=main