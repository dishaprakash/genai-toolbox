name: "Build Docs Preview"

on:
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/docs**'
      - '.hugo/**'

# Minimal permissions for security
permissions:
  contents: read

jobs:
  build-preview:
    runs-on: ubuntu-24.04
    concurrency:
      group: "preview-${{ github.event.number }}"
      cancel-in-progress: true
    defaults:
      run:
        working-directory: .hugo
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0 

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.145.0"
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/.hugo/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install and Build
        run: |
          npm ci --ignore-scripts
          hugo --minify
        env:
          HUGO_BASEURL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/previews/PR-${{ github.event.number }}/
          HUGO_ENVIRONMENT: preview
          HUGO_RELATIVEURLS: false

      - name: Prepare Artifact Payload
        working-directory: .
        run: |
          mkdir -p docs-dist
          cp -r .hugo/public docs-dist/public
          echo ${{ github.event.number }} > docs-dist/pr_number.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview-data
          path: docs-dist/
          retention-days: 1
