name: "Deploy Docs Preview"

on:
  workflow_run:
    workflows: ["Build Docs Preview"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    # Only run if the triggering workflow was a Pull Request and it finished successfully.
    # This prevents the job from running on standard pushes to the main branch.
    if: ${{ github.event.workflow_run.event == 'pull_request' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    concurrency:
      group: "docs-deploy"
      cancel-in-progress: true
    env:
      PARENT_RUN_ID: ${{ github.event.workflow_run.id }}
      REPO_OWNER: ${{ github.repository_owner }}
      REPO_NAME: ${{ github.event.repository.name }}
    steps:
      - name: Checkout base repository
        uses: actions/checkout@v4 

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-preview-data
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ env.PARENT_RUN_ID }}
          path: downloaded-artifact

      - name: Read PR Number
        id: get_pr
        run: |
          PR_NUMBER=$(cat downloaded-artifact/pr_number.txt)
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "Error: Invalid PR number detected."
            exit 1
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: downloaded-artifact/public
          publish_branch: versioned-gh-pages
          destination_dir: ./previews/PR-${{ steps.get_pr.outputs.pr_number }}
          commit_message: "stage: PR-${{ steps.get_pr.outputs.pr_number }} preview"

      - name: Post Preview Comment
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = parseInt('${{ steps.get_pr.outputs.pr_number }}', 10);
            const owner = process.env.REPO_OWNER;
            const repo = process.env.REPO_NAME;
            
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: owner,
              repo: repo,
              body: `🔎 **Documentation Preview Ready!**\n\n[View Preview](https://${owner}.github.io/${repo}/previews/PR-${prNumber}/)`
            });
